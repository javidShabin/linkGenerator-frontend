<!-- public/assets/hero.svg -->
<svg width="100%" height="100%" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="800" height="600" fill="url(#grad)" rx="30"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#dd63ff"/>
      <stop offset="1" stop-color="#ff914d"/>
    </linearGradient>
  </defs>
  <g>
    <circle cx="200" cy="150" r="80" fill="white" fill-opacity="0.2"/>
    <circle cx="600" cy="450" r="100" fill="white" fill-opacity="0.2"/>
    <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="38" fill="white" font-family="Arial, sans-serif">
      WhatsApp Link Generator
    </text>
  </g>
</svg>
